<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch</title>
</head>
<body>

    <input type="text" name="name" id="PokemonName" placeholder="Enter Pokemon name">
    <button onclick="fetchData()">Fetch pokemon</button>
    <br>
    <img src="" alt="pokemon Image" id="pokemonImg" style="display: none;">
    

    <script>
        // fetch("https://pokeapi.co/api/v2/pokemon/pikach")
        // .then(response => {
        //     if(!response.ok){
        //         throw new Error("Could not fetch resource")
        //     }
        //     return response.json()
            
            
        // })
        // .then(data => console.log(data.name))
        // .catch(error => console.error(error))

        async function fetchData() {
            try{

                const PokemonName = document.getElementById("PokemonName").value.toLowerCase();
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${PokemonName}`)
                if(!response.ok){
                    throw new Error("404")
                }
                const data = await response.json()
                const PokemonImg = data.sprites.front_default;
                const img = document.getElementById("pokemonImg");
                img.src = PokemonImg
                img.style.display = "block"
            }
            catch(error){
                // console.error(error)
            }
        }

        fetchData()
    </script>
</body>
</html>
